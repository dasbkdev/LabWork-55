databaseChangeLog:
  - changeSet:
      id: 03-create-questions
      author: homework
      changes:
        - createTable:
            tableName: questions
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: quiz_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: question_text
                  type: varchar(1000)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: questions
            baseColumnNames: quiz_id
            referencedTableName: quizzes
            referencedColumnNames: id
            constraintName: fk_questions_quiz